<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MATCHAKEUN - Premium Beverage POS</title>
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  
  <!-- React & ReactDOM CDN -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel untuk kompilasi JSX di Browser -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Lucide Icons (Untuk ikon modern) -->
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <style>
    /* Mengatasi scrollbar default dan styling tambahan */
    .scrollbar-none::-webkit-scrollbar { display: none; }
    .scrollbar-none { -ms-overflow-style: none; scrollbar-width: none; }
    body { background-color: #f5f5f5; }
  </style>
</head>
<body>

  <!-- Root element untuk React -->
  <div id="root"></div>

  <!-- Script Aplikasi POS (Babel/JSX) -->
  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    // --- MOCK DATA AWAL ---
    const DEFAULT_PRODUCTS = [
      { id: "prod-1", name: "Matcha Latte Signature", category: "Matcha Series", price: 15000, hpp: 6000, margin: 60, active: true, recipe: "1. Larutkan 5gr Pure Matcha dengan 30ml air hangat.\n2. Tambahkan 15ml Gula Cair.\n3. Es batu penuh (Cup 16oz).\n4. Tuang 120ml Susu Segar.\n5. Layering matcha di atas." },
      { id: "prod-2", name: "Es Kopi Susu Aren", category: "Coffee Series", price: 13000, hpp: 5000, margin: 61.5, active: true, recipe: "1. 1 shot Espresso (30ml).\n2. 20ml Gula Aren cair di dasar cup.\n3. Masukkan es batu secukupnya.\n4. Tuang 100ml susu UHT.\n5. Masukkan espresso di layer atas." },
      { id: "prod-3", name: "Matcha Strawberry Float", category: "Matcha Series", price: 18000, hpp: 8000, margin: 55.5, active: true, recipe: "1. 2 sendok selai strawberry di dasar cup.\n2. Beri es batu secukupnya.\n3. Campur 120ml susu & 10ml vanilla, tuang ke cup.\n4. Larutkan 4gr matcha dengan 30ml air, tuang.\n5. Toping 1 scoop Es Krim Vanilla." },
      { id: "prod-4", name: "Ice Jasmine Green Tea", category: "Tea Series", price: 10000, hpp: 3000, margin: 70, active: true, recipe: "1. Seduh Jasmine Tea 150ml air panas (3 menit).\n2. Tambahkan 25ml Gula Cair.\n3. Shake dengan es batu.\n4. Sajikan dalam cup." }
    ];

    const DEFAULT_SETTINGS = {
      shopName: "MATCHAKEUN",
      logoText: "Matcha & Coffee Space",
      address: "Jl. Hijau Rindang No. 12, Bandung",
      phone: "628123456789",
      footerReceipt: "Terima kasih atas kunjungan Anda!\nKritik & Saran silakan WA ke nomor kami."
    };

    function App() {
      // --- STATE MANAGEMENT ---
      const [products, setProducts] = useState(() => {
        const saved = localStorage.getItem('mk_products');
        return saved ? JSON.parse(saved) : DEFAULT_PRODUCTS;
      });
      const [sales, setSales] = useState(() => {
        const saved = localStorage.getItem('mk_sales');
        return saved ? JSON.parse(saved) : [];
      });
      const [settings, setSettings] = useState(() => {
        const saved = localStorage.getItem('mk_settings');
        return saved ? JSON.parse(saved) : DEFAULT_SETTINGS;
      });

      const [cart, setCart] = useState([]);
      const [activeTab, setActiveTab] = useState('pos');
      const [searchQuery, setSearchQuery] = useState('');
      const [selectedCategory, setSelectedCategory] = useState('Semua');
      
      // Modal & Form State
      const [isProductModalOpen, setIsProductModalOpen] = useState(false);
      const [editingProduct, setEditingProduct] = useState(null);
      const [productForm, setProductForm] = useState({ name: '', category: 'Matcha Series', price: '', hpp: '', margin: 0, active: true, recipe: '' });
      const [recipeModal, setRecipeModal] = useState({ isOpen: false, transactionId: '', items: [] });
      const [selectedHistoryTx, setSelectedHistoryTx] = useState(null);
      const [deleteConfirmId, setDeleteConfirmId] = useState(null);
      const [notification, setNotification] = useState(null);
      
      // Filter State
      const [historySearch, setHistorySearch] = useState('');
      const [historyDateFilter, setHistoryDateFilter] = useState('');
      const [reportFilter, setReportFilter] = useState('today');

      // --- EFFECTS FOR PERSISTENCE ---
      useEffect(() => { localStorage.setItem('mk_products', JSON.stringify(products)); }, [products]);
      useEffect(() => { localStorage.setItem('mk_sales', JSON.stringify(sales)); }, [sales]);
      useEffect(() => { localStorage.setItem('mk_settings', JSON.stringify(settings)); }, [settings]);

      // --- UTILITIES ---
      const showNotification = (message, type = 'success') => {
        setNotification({ message, type });
        setTimeout(() => setNotification(null), 3000);
      };

      const formatRupiah = (num) => {
        return 'Rp ' + Number(num).toLocaleString('id-ID');
      };

      const calculateMargin = (price, hpp) => {
        const p = parseFloat(price) || 0;
        const h = parseFloat(hpp) || 0;
        return p === 0 ? 0 : parseFloat(((p - h) / p * 100).toFixed(1));
      };

      // --- CART ACTIONS ---
      const addToCart = (product) => {
        if (!product.active) return showNotification("Menu sedang kosong!", "error");
        setCart(prev => {
          const ex = prev.find(i => i.id === product.id);
          if (ex) return prev.map(i => i.id === product.id ? { ...i, qty: i.qty + 1 } : i);
          return [...prev, { id: product.id, name: product.name, price: product.price, hpp: product.hpp, qty: 1, recipe: product.recipe }];
        });
      };

      const changeQty = (id, delta) => {
        setCart(prev => prev.map(i => {
          if (i.id === id) {
            const newQty = i.qty + delta;
            return newQty > 0 ? { ...i, qty: newQty } : null;
          }
          return i;
        }).filter(Boolean));
      };

      const cartTotals = useMemo(() => {
        return cart.reduce((acc, i) => {
          acc.total += i.price * i.qty;
          acc.hpp += i.hpp * i.qty;
          acc.qty += i.qty;
          return acc;
        }, { total: 0, hpp: 0, qty: 0 });
      }, [cart]);

      // --- CHECKOUT PROCESS ---
      const handleCheckout = () => {
        if (cart.length === 0) return;
        const now = new Date();
        const txId = `TRX-${now.getFullYear()}${(now.getMonth()+1).toString().padStart(2,'0')}${now.getDate().toString().padStart(2,'0')}-${Date.now().toString().slice(-4)}`;
        
        const newSale = {
          id: txId,
          timestamp: now.toISOString(),
          items: [...cart],
          totalPrice: cartTotals.total,
          profit: cartTotals.total - cartTotals.hpp,
          totalQty: cartTotals.qty
        };

        setSales([newSale, ...sales]);
        setRecipeModal({ isOpen: true, transactionId: txId, items: [...cart] });
        setCart([]);
        showNotification("Transaksi Berhasil Disimpan!", "success");
      };

      // --- PRODUCT CRUD ---
      const openAddMenu = () => {
        setEditingProduct(null);
        setProductForm({ name: '', category: 'Matcha Series', price: '', hpp: '', margin: 0, active: true, recipe: '' });
        setIsProductModalOpen(true);
      };

      const openEditMenu = (p) => {
        setEditingProduct(p);
        setProductForm({ ...p });
        setIsProductModalOpen(true);
      };

      const saveProduct = (e) => {
        e.preventDefault();
        if (editingProduct) {
          setProducts(products.map(p => p.id === editingProduct.id ? { ...p, ...productForm, price: Number(productForm.price), hpp: Number(productForm.hpp) } : p));
        } else {
          setProducts([{ ...productForm, id: 'p-' + Date.now(), price: Number(productForm.price), hpp: Number(productForm.hpp) }, ...products]);
        }
        setIsProductModalOpen(false);
        showNotification("Menu Berhasil Diperbarui!");
      };

      // --- FILTER LOGIC ---
      const filteredProducts = useMemo(() => {
        return products.filter(p => {
          const matchSearch = p.name.toLowerCase().includes(searchQuery.toLowerCase());
          const matchCat = selectedCategory === 'Semua' || p.category === selectedCategory;
          return matchSearch && matchCat;
        });
      }, [products, searchQuery, selectedCategory]);

      const categories = ['Semua', ...new Set(products.map(p => p.category))];

      const statistics = useMemo(() => {
        const todayStr = new Date().toDateString();
        return sales.reduce((acc, s) => {
          const isToday = new Date(s.timestamp).toDateString() === todayStr;
          if (isToday) {
            acc.omzetToday += s.totalPrice;
            acc.profitToday += s.profit;
          }
          acc.omzetTotal += s.totalPrice;
          acc.cupsTotal += s.totalQty;
          return acc;
        }, { omzetToday: 0, profitToday: 0, omzetTotal: 0, cupsTotal: 0, txCount: sales.length });
      }, [sales]);

      // Backup & Restore
      const exportData = () => {
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify({ products, sales, settings }));
        const dl = document.createElement('a');
        dl.setAttribute("href", dataStr);
        dl.setAttribute("download", `POS_MATCHAKEUN_BACKUP.json`);
        dl.click();
      };

      return (
        <div className="flex flex-col min-h-screen bg-neutral-50 text-neutral-800">
          
          {/* NOTIFIKASI */}
          {notification && (
            <div className="fixed top-4 right-4 z-50 bg-[#5E8B4A] text-white px-6 py-3 rounded-xl shadow-xl font-bold flex items-center gap-2 transition-all">
              <span>✓</span> {notification.message}
            </div>
          )}

          {/* HEADER */}
          <header className="bg-[#5E8B4A] text-white px-6 py-4 shadow-md sticky top-0 z-40">
            <div className="max-w-7xl mx-auto flex flex-col sm:flex-row justify-between items-center gap-4">
              <div className="flex items-center gap-3">
                <span className="text-2xl">🍃</span>
                <div>
                  <h1 className="text-xl font-black tracking-wider">{settings.shopName}</h1>
                  <p className="text-xs opacity-80">{settings.logoText}</p>
                </div>
              </div>
              <div className="flex gap-2">
                <button onClick={() => setActiveTab('pos')} className={`px-4 py-2 rounded-xl text-xs font-bold transition-all ${activeTab === 'pos' ? 'bg-white text-[#5E8B4A]' : 'hover:bg-emerald-700'}`}>KASIR</button>
                <button onClick={() => setActiveTab('history')} className={`px-4 py-2 rounded-xl text-xs font-bold transition-all ${activeTab === 'history' ? 'bg-white text-[#5E8B4A]' : 'hover:bg-emerald-700'}`}>RIWAYAT</button>
                <button onClick={() => setActiveTab('report')} className={`px-4 py-2 rounded-xl text-xs font-bold transition-all ${activeTab === 'report' ? 'bg-white text-[#5E8B4A]' : 'hover:bg-emerald-700'}`}>LAPORAN</button>
                <button onClick={() => setActiveTab('settings')} className={`px-4 py-2 rounded-xl text-xs font-bold transition-all ${activeTab === 'settings' ? 'bg-white text-[#5E8B4A]' : 'hover:bg-emerald-700'}`}>SETTING</button>
              </div>
            </div>
          </header>

          {/* KONTEN UTAMA */}
          <main className="flex-grow max-w-7xl w-full mx-auto p-4 sm:p-6">
            
            {/* TAB: KASIR */}
            {activeTab === 'pos' && (
              <div className="grid grid-cols-1 lg:grid-cols-12 gap-6">
                
                {/* KATALOG MENU */}
                <div className="lg:col-span-8 space-y-4">
                  <div className="bg-white p-4 rounded-2xl shadow-sm border border-neutral-200 flex flex-col sm:flex-row justify-between items-center gap-4">
                    <input 
                      type="text" 
                      placeholder="Cari Menu..." 
                      value={searchQuery}
                      onChange={e => setSearchQuery(e.target.value)}
                      className="w-full sm:w-64 px-4 py-2 bg-neutral-100 border border-neutral-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-[#5E8B4A]"
                    />
                    <div className="flex gap-2 overflow-x-auto w-full sm:w-auto pb-1 scrollbar-none">
                      {categories.map(c => (
                        <button key={c} onClick={() => setSelectedCategory(c)} className={`px-3 py-1.5 rounded-full text-xs font-bold whitespace-nowrap ${selectedCategory === c ? 'bg-[#5E8B4A] text-white' : 'bg-neutral-100 text-neutral-600'}`}>{c}</button>
                      ))}
                    </div>
                    <button onClick={openAddMenu} className="w-full sm:w-auto px-4 py-2 bg-[#5E8B4A] text-white text-xs font-bold rounded-xl shadow">+ MENU</button>
                  </div>

                  {products.length === 0 ? (
                    <div className="bg-white p-12 text-center rounded-2xl border-2 border-dashed border-neutral-300">
                      <p className="text-neutral-500 font-bold mb-4">Belum ada menu terdaftar</p>
                      <button onClick={openAddMenu} className="px-6 py-3 bg-[#5E8B4A] text-white font-bold rounded-xl shadow">+ Tambah Menu Pertama</button>
                    </div>
                  ) : (
                    <div className="grid grid-cols-2 sm:grid-cols-3 gap-4">
                      {filteredProducts.map(p => (
                        <div key={p.id} onClick={() => addToCart(p)} className={`bg-white p-4 rounded-2xl border border-neutral-200 shadow-sm flex flex-col justify-between cursor-pointer hover:shadow-md transition-all active:scale-95 ${!p.active && 'opacity-50'}`}>
                          <div>
                            <span className="text-[10px] uppercase font-bold text-neutral-400 block mb-1">{p.category}</span>
                            <h3 className="font-bold text-neutral-800 text-sm line-clamp-2">{p.name}</h3>
                          </div>
                          <div className="flex justify-between items-center mt-4 pt-2 border-t border-neutral-100">
                            <span className="font-extrabold text-[#5E8B4A] text-sm">{formatRupiah(p.price)}</span>
                            <button onClick={(e) => { e.stopPropagation(); openEditMenu(p); }} className="text-neutral-400 hover:text-neutral-700 text-xs font-bold px-2 py-1 bg-neutral-100 rounded-lg">EDIT</button>
                          </div>
                        </div>
                      ))}
                    </div>
                  )}
                </div>

                {/* KERANJANG BELANJA */}
                <div className="lg:col-span-4">
                  <div className="bg-white p-5 rounded-2xl border border-neutral-200 shadow-md sticky top-24 flex flex-col max-h-[calc(100vh-140px)]">
                    <h2 className="font-bold text-base text-neutral-800 border-b pb-3 flex justify-between">
                      <span>Keranjang Belanja</span>
                      <span className="bg-[#5E8B4A] text-white text-xs px-2 py-0.5 rounded-full">{cartTotals.qty}</span>
                    </h2>
                    
                    <div className="flex-grow overflow-y-auto my-4 space-y-3 pr-1">
                      {cart.length === 0 ? (
                        <p className="text-center text-neutral-400 text-xs py-8">Keranjang kosong</p>
                      ) : (
                        cart.map(i => (
                          <div key={i.id} className="bg-neutral-50 p-3 rounded-xl border border-neutral-200 flex justify-between items-center">
                            <div className="max-w-[60%]">
                              <h4 className="font-bold text-xs text-neutral-800 truncate">{i.name}</h4>
                              <span className="text-[10px] text-neutral-400">{formatRupiah(i.price)}</span>
                            </div>
                            <div className="flex items-center gap-2">
                              <button onClick={() => changeQty(i.id, -1)} className="w-6 h-6 bg-white border rounded-full text-xs font-bold flex items-center justify-center hover:bg-red-50">-</button>
                              <span className="font-bold text-xs">{i.qty}</span>
                              <button onClick={() => changeQty(i.id, 1)} className="w-6 h-6 bg-white border rounded-full text-xs font-bold flex items-center justify-center hover:bg-emerald-50">+</button>
                            </div>
                          </div>
                        ))
                      )}
                    </div>

                    <div className="border-t pt-4 space-y-4">
                      <div className="flex justify-between font-black text-sm text-neutral-800">
                        <span>Total Bayar</span>
                        <span className="text-[#5E8B4A] text-base">{formatRupiah(cartTotals.total)}</span>
                      </div>
                      <button 
                        onClick={handleCheckout} 
                        disabled={cart.length === 0}
                        className={`w-full py-3 rounded-xl font-bold text-xs tracking-wider transition-all shadow ${cart.length > 0 ? 'bg-[#5E8B4A] text-white hover:bg-emerald-700' : 'bg-neutral-200 text-neutral-400 cursor-not-allowed'}`}
                      >
                        PROSES PENJUALAN (JUAL)
                      </button>
                    </div>
                  </div>
                </div>

              </div>
            )}

            {/* TAB: RIWAYAT */}
            {activeTab === 'history' && (
              <div className="bg-white p-6 rounded-2xl border border-neutral-200 shadow-sm space-y-4">
                <h2 className="text-lg font-bold">Riwayat Transaksi</h2>
                <div className="overflow-x-auto">
                  <table className="w-full text-left text-xs">
                    <thead>
                      <tr className="border-b bg-neutral-50 text-neutral-500 font-bold uppercase">
                        <th className="p-3">ID Transaksi</th>
                        <th className="p-3">Waktu</th>
                        <th className="p-3">Item</th>
                        <th className="p-3 text-center">Cup</th>
                        <th className="p-3 text-right">Total</th>
                        <th className="p-3 text-center">Resep</th>
                      </tr>
                    </thead>
                    <tbody className="divide-y">
                      {sales.map(s => (
                        <tr key={s.id} className="hover:bg-neutral-50">
                          <td className="p-3 font-mono font-bold">{s.id}</td>
                          <td className="p-3 text-neutral-500">{new Date(s.timestamp).toLocaleString('id-ID')}</td>
                          <td className="p-3">{s.items.map(i => `${i.name} (${i.qty})`).join(', ')}</td>
                          <td className="p-3 text-center font-bold">{s.totalQty}</td>
                          <td className="p-3 text-right font-bold text-emerald-700">{formatRupiah(s.totalPrice)}</td>
                          <td className="p-3 text-center">
                            <button onClick={() => setSelectedHistoryTx(s)} className="bg-emerald-50 text-[#5E8B4A] px-2 py-1 rounded font-bold">Lihat</button>
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            )}

            {/* TAB: LAPORAN */}
            {activeTab === 'report' && (
              <div className="space-y-6">
                <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
                  <div className="bg-white p-4 rounded-xl border shadow-sm">
                    <span className="text-[10px] uppercase font-bold text-neutral-400 block">Omzet Hari Ini</span>
                    <h3 className="text-lg font-black text-[#5E8B4A] mt-1">{formatRupiah(statistics.omzetToday)}</h3>
                  </div>
                  <div className="bg-white p-4 rounded-xl border shadow-sm">
                    <span className="text-[10px] uppercase font-bold text-neutral-400 block">Keuntungan Hari Ini</span>
                    <h3 className="text-lg font-black text-emerald-700 mt-1">{formatRupiah(statistics.profitToday)}</h3>
                  </div>
                  <div className="bg-white p-4 rounded-xl border shadow-sm">
                    <span className="text-[10px] uppercase font-bold text-neutral-400 block">Akumulasi Omzet Global</span>
                    <h3 className="text-lg font-black text-neutral-800 mt-1">{formatRupiah(statistics.omzetTotal)}</h3>
                  </div>
                  <div className="bg-white p-4 rounded-xl border shadow-sm">
                    <span className="text-[10px] uppercase font-bold text-neutral-400 block">Total Cup & Transaksi</span>
                    <h3 className="text-lg font-black text-neutral-800 mt-1">{statistics.cupsTotal} Cup ({statistics.txCount} Tx)</h3>
                  </div>
                </div>
              </div>
            )}

            {/* TAB: SETTING */}
            {activeTab === 'settings' && (
              <div className="bg-white p-6 rounded-2xl border border-neutral-200 shadow-sm max-w-xl space-y-4">
                <h2 className="text-lg font-bold">Pengaturan Aplikasi</h2>
                <div className="space-y-3">
                  <div>
                    <label className="text-xs font-bold text-neutral-500 block mb-1">Nama Toko</label>
                    <input type="text" value={settings.shopName} onChange={e => setSettings({...settings, shopName: e.target.value})} className="w-full p-2 bg-neutral-50 border rounded-lg text-sm" />
                  </div>
                  <div>
                    <label className="text-xs font-bold text-neutral-500 block mb-1">Slogan</label>
                    <input type="text" value={settings.logoText} onChange={e => setSettings({...settings, logoText: e.target.value})} className="w-full p-2 bg-neutral-50 border rounded-lg text-sm" />
                  </div>
                  <div className="pt-4 border-t flex gap-2">
                    <button onClick={exportData} className="px-4 py-2 bg-neutral-100 border text-xs font-bold rounded-lg shadow-sm">Backup Database (.JSON)</button>
                    <button onClick={() => showNotification("Pengaturan disimpan!")} className="px-4 py-2 bg-[#5E8B4A] text-white text-xs font-bold rounded-lg shadow">Simpan</button>
                  </div>
                </div>
              </div>
            )}

          </main>

          {/* MODAL FULLSCREEN RESEP (BARISTA PANDUAN) */}
          {recipeModal.isOpen && (
            <div className="fixed inset-0 z-50 bg-black/80 flex items-center justify-center p-4">
              <div className="bg-white rounded-2xl w-full max-w-2xl max-h-[85vh] overflow-y-auto flex flex-col shadow-2xl">
                <div className="bg-[#5E8B4A] text-white p-5 font-bold flex justify-between items-center">
                  <div>
                    <span className="text-[10px] uppercase tracking-wider bg-emerald-800 px-2 py-0.5 rounded">Resep Transaksi Sukses</span>
                    <h3 className="text-base font-mono mt-1">{recipeModal.transactionId}</h3>
                  </div>
                </div>
                <div className="p-5 flex-grow space-y-4">
                  {recipeModal.items.map((item, idx) => (
                    <div key={idx} className="bg-neutral-50 p-4 rounded-xl border">
                      <div className="flex justify-between border-b pb-2 mb-2 font-bold text-sm">
                        <span>{item.name}</span>
                        <span className="text-[#5E8B4A]">×{item.qty} Cup</span>
                      </div>
                      <p className="text-xs font-mono whitespace-pre-line text-neutral-600 leading-relaxed bg-white p-3 rounded border border-neutral-100">{item.recipe || 'Belum ada resep dimasukkan.'}</p>
                    </div>
                  ))}
                </div>
                <div className="p-4 bg-neutral-50 border-t flex justify-end">
                  <button onClick={() => setRecipeModal({ isOpen: false, transactionId: '', items: [] })} className="px-6 py-3 bg-[#5E8B4A] text-white text-xs font-bold rounded-xl shadow">✔ MINUMAN SELESAI</button>
                </div>
              </div>
            </div>
          )}

          {/* MODAL TAMBAH/EDIT MENU */}
          {isProductModalOpen && (
            <div className="fixed inset-0 z-50 bg-black/50 flex items-center justify-center p-4">
              <form onSubmit={saveProduct} className="bg-white rounded-2xl w-full max-w-md overflow-hidden shadow-xl">
                <div className="bg-[#5E8B4A] text-white p-4 font-bold text-sm">{editingProduct ? 'Edit Menu' : 'Tambah Menu Baru'}</div>
                <div className="p-4 space-y-3 text-xs">
                  <div>
                    <label className="font-bold text-neutral-500 block mb-1">Nama Menu</label>
                    <input type="text" required value={productForm.name} onChange={e => setProductForm({...productForm, name: e.target.value})} className="w-full p-2 bg-neutral-50 border rounded-lg" />
                  </div>
                  <div className="grid grid-cols-2 gap-2">
                    <div>
                      <label className="font-bold text-neutral-500 block mb-1">Harga Jual (Rp)</label>
                      <input type="number" required value={productForm.price} onChange={e => setProductForm({...productForm, price: e.target.value, margin: calculateMargin(e.target.value, productForm.hpp)})} className="w-full p-2 bg-neutral-50 border rounded-lg" />
                    </div>
                    <div>
                      <label className="font-bold text-neutral-500 block mb-1">HPP (Rp)</label>
                      <input type="number" value={productForm.hpp} onChange={e => setProductForm({...productForm, hpp: e.target.value, margin: calculateMargin(productForm.price, e.target.value)})} className="w-full p-2 bg-neutral-50 border rounded-lg" />
                    </div>
                  </div>
                  <div className="bg-emerald-50 p-2 text-[10px] text-emerald-800 font-bold rounded">Margin Keuntungan: {productForm.margin}%</div>
                  <div>
                    <label className="font-bold text-neutral-500 block mb-1">Resep Pembuatan (Bebas Ketik)</label>
                    <textarea rows="4" value={productForm.recipe} onChange={e => setProductForm({...productForm, recipe: e.target.value})} className="w-full p-2 bg-neutral-50 border rounded-lg font-mono" placeholder="Masukkan takaran susu, es, matcha..." />
                  </div>
                </div>
                <div className="p-4 bg-neutral-50 border-t flex justify-between">
                  {editingProduct ? (
                    <button type="button" onClick={() => { setProducts(products.filter(p => p.id !== editingProduct.id)); setIsProductModalOpen(false); showNotification("Menu dihapus!"); }} className="px-3 py-2 bg-red-50 text-red-600 font-bold rounded-xl">Hapus</button>
                  ) : <div />}
                  <div className="flex gap-2">
                    <button type="button" onClick={() => setIsProductModalOpen(false)} className="px-3 py-2 bg-neutral-200 text-neutral-600 font-bold rounded-xl">Batal</button>
                    <button type="submit" className="px-4 py-2 bg-[#5E8B4A] text-white font-bold rounded-xl shadow">Simpan</button>
                  </div>
                </div>
              </form>
            </div>
          )}

          {/* DETAIL RESEP RIWAYAT LAMA */}
          {selectedHistoryTx && (
            <div className="fixed inset-0 z-50 bg-black/60 flex items-center justify-center p-4">
              <div className="bg-white rounded-2xl w-full max-w-md max-h-[80vh] overflow-y-auto p-5 space-y-4">
                <h3 className="font-bold text-sm border-b pb-2">Resep Transaksi: {selectedHistoryTx.id}</h3>
                {selectedHistoryTx.items.map((it, idx) => (
                  <div key={idx} className="space-y-1">
                    <span className="font-bold text-xs block text-neutral-700">{it.name} (×{it.qty})</span>
                    <p className="text-xs font-mono bg-neutral-50 p-2 rounded border whitespace-pre-line text-neutral-600">{it.recipe || 'Tidak ada catatan resep.'}</p>
                  </div>
                ))}
                <div className="flex justify-end pt-2 border-t">
                  <button onClick={() => setSelectedHistoryTx(null)} className="px-4 py-2 bg-[#5E8B4A] text-white text-xs font-bold rounded-lg">Tutup</button>
                </div>
              </div>
            </div>
          )}

        </div>
      );
    }

    const root = SnowyReactDOM.createRoot(document.getElementById('root'));
    // Fallback handle for Standard React Render
    const container = document.getElementById('root');
    const reactRoot = ReactDOM.createRoot(container);
    reactRoot.render(<App />);
  </script>
</body>
  </html>
